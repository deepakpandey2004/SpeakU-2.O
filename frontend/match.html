<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finding Partner - SpeakU</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="finding-container">
        <div class="finding-top">
            <div class="finding-dots">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span>
            </div>

            <div class="finding-avatar-wrap">
                <div class="finding-avatar" id="user-avatar">👤</div>
            </div>
        </div>

        <div class="finding-content">
            <h1 class="finding-title" id="finding-title">Looking for a new partner</h1>
            <p class="finding-subtitle" id="finding-subtitle">Please wait a moment...</p>

            <div class="finding-tip">
                <span class="tip-icon">💡</span>
                <span>Have fun practicing! :)</span>
            </div>

            <div class="finding-timer" id="finding-timer">00:00</div>

            <div id="lang-info" class="finding-langs"></div>
        </div>

        <div class="finding-footer">
            <button class="cancel-call-btn" id="cancel-btn">
                <span class="cancel-icon">📞</span>
                <span>Cancel</span>
            </button>
        </div>
    </div>

    <script src="/js/config.js?v=2"></script>
    <script src="/js/ui.js?v=2"></script>
    <script src="/js/auth.js?v=2"></script>
    <script src="/js/api.js?v=2"></script>
    <script src="/js/websocket.js?v=2"></script>
    <script src="/js/match.js?v=2"></script>
</body>
</html>
